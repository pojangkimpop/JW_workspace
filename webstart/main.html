<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Main</title>
    <style>
      h1{
        text-align: center;
      }
      #welcome_txt{
        text-align: center;
      }
      .card{
        text-align: center;
      }
      .card_img{
        width: 200px;
        height: 200px;
      }
      .card_title{
        font-size: 20px;
      }
      .card_button{
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Tennis Market</h1>
    <div id="welcome_txt">
      Welcome to Tennis market!<br>
      Enjoy your shopping.<br>
      <br>
      <a href="./orderlist.html" type="button" value="orderlist">Order list</a>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr;">
      <div class="card">
        <img class="card_img" src="./img/redRacket.png">
        <p class="card_title">RedRacket</p>
        <input class="card_button" type="button" value="order" onclick="alert(1)">
      </div>
      <div class="card">
        <img class="card_img" src="./img/blueRacket.png">
        <p class="card_title">BlueRacket</p>
        <input class="card_button" type="button" value="order" onclick="alert(2)">
      </div>
      <div class="card">
        <img class="card_img" src="./img/blackRacket.png">
        <p class="card_title">BlackRacket</p>
        <input class="card_button" type="button" value="order" onclick="alert(3)">
      </div>
    </div>
  </body>
</html>
